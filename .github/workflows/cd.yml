name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Coolify
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        if: env.COOLIFY_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"event": "deploy", "branch": "main"}'

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.2.0
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        if: env.SSH_HOST != ''
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/nikago
            docker-compose exec -T backend php artisan migrate --force
            docker-compose exec -T backend php artisan optimize
            docker-compose exec -T backend php artisan icons:cache

      - name: Health check
        run: |
          sleep 30
          curl -fI "${{ secrets.APP_URL }}/up" || echo "Health check failed"

      - name: Notify deployment success
        if: success()
        run: |
          curl -X POST "${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "Nikago production deployment successful"}'
